<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Intrusion Detection System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.running {
            background: #4CAF50;
        }

        .status-dot.stopped {
            background: #f44336;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
        }

        .metric-value {
            font-weight: bold;
            color: #333;
        }

        .metric-value.high {
            color: #f44336;
        }

        .metric-value.warning {
            color: #ff9800;
        }

        .metric-value.normal {
            color: #4CAF50;
        }

        .alert-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid;
        }

        .alert-critical {
            background: #ffebee;
            border-color: #f44336;
        }

        .alert-high {
            background: #fff3e0;
            border-color: #ff9800;
        }

        .alert-medium {
            background: #fff8e1;
            border-color: #ffeb3b;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .alerts-container {
            max-height: 400px;
            overflow-y: auto;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 20px;
            padding: 20px;
        }

        .refresh-info {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Host Intrusion Detection System</h1>
            <div class="status-bar">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Checking...</span>
                </div>
                <button class="btn btn-primary" onclick="startMonitoring()">Start Monitoring</button>
                <button class="btn btn-danger" onclick="stopMonitoring()">Stop Monitoring</button>
                <button class="btn btn-primary" onclick="refreshData()">Refresh Data</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <h2>System Metrics</h2>
                <div class="metric">
                    <span class="metric-label">CPU Usage:</span>
                    <span class="metric-value" id="cpuUsage">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Memory Usage:</span>
                    <span class="metric-value" id="memoryUsage">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Active Processes:</span>
                    <span class="metric-value" id="processCount">--</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Network Connections:</span>
                    <span class="metric-value" id="networkConnections">--</span>
                </div>
            </div>

            <div class="card">
                <h2>Anomaly Score Trend</h2>
                <div class="chart-container">
                    <canvas id="anomalyChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>CPU & Memory Usage</h2>
                <div class="chart-container">
                    <canvas id="resourceChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>Recent Alerts</h2>
                <div class="alerts-container" id="alertsList">
                    <p style="text-align: center; color: #999;">No alerts yet</p>
                </div>
            </div>
        </div>

        <footer>
            <p>Host Intrusion Detection System v1.0</p>
            <p class="refresh-info">Auto-refresh every 5 seconds | Last update: <span id="lastUpdate">--</span></p>
        </footer>
    </div>

    <script>
        let anomalyChart, resourceChart;
        let isRunning = false;

        // Initialize charts
        function initCharts() {
            const anomalyCtx = document.getElementById('anomalyChart').getContext('2d');
            anomalyChart = new Chart(anomalyCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Anomaly Score',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 1
                        }
                    }
                }
            });

            const resourceCtx = document.getElementById('resourceChart').getContext('2d');
            resourceChart = new Chart(resourceCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'CPU %',
                            data: [],
                            borderColor: '#f44336',
                            tension: 0.4
                        },
                        {
                            label: 'Memory %',
                            data: [],
                            borderColor: '#4CAF50',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }

        async function refreshData() {
            try {
                // Get status
                const statusResponse = await fetch('/api/status');
                const status = await statusResponse.json();
                
                document.getElementById('statusText').textContent = 
                    status.status === 'running' ? 'Monitoring Active' : 'Monitoring Stopped';
                document.getElementById('statusDot').className = 
                    'status-dot ' + (status.status === 'running' ? 'running' : 'stopped');
                
                // Get metrics
                const metricsResponse = await fetch('/api/metrics');
                const metrics = await metricsResponse.json();
                
                updateMetrics(metrics);
                updateCharts(metrics);
                
                // Get alerts
                const alertsResponse = await fetch('/api/alerts?limit=10');
                const alerts = await alertsResponse.json();
                updateAlerts(alerts);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function updateMetrics(metrics) {
            const cpuEl = document.getElementById('cpuUsage');
            const memEl = document.getElementById('memoryUsage');
            const procEl = document.getElementById('processCount');
            const netEl = document.getElementById('networkConnections');
            
            cpuEl.textContent = (metrics.cpu_percent || 0).toFixed(1) + '%';
            cpuEl.className = 'metric-value ' + getMetricClass(metrics.cpu_percent, [70, 90]);
            
            memEl.textContent = (metrics.memory_percent || 0).toFixed(1) + '%';
            memEl.className = 'metric-value ' + getMetricClass(metrics.memory_percent, [70, 90]);
            
            procEl.textContent = metrics.num_processes || 0;
            netEl.textContent = metrics.network_connections || 0;
        }

        function getMetricClass(value, thresholds) {
            if (value >= thresholds[1]) return 'high';
            if (value >= thresholds[0]) return 'warning';
            return 'normal';
        }

        function updateCharts(metrics) {
            const now = new Date().toLocaleTimeString();
            
            // Update anomaly chart
            if (anomalyChart.data.labels.length > 20) {
                anomalyChart.data.labels.shift();
                anomalyChart.data.datasets[0].data.shift();
            }
            anomalyChart.data.labels.push(now);
            anomalyChart.data.datasets[0].data.push(metrics.anomaly_score || 0);
            anomalyChart.update();
            
            // Update resource chart
            if (resourceChart.data.labels.length > 20) {
                resourceChart.data.labels.shift();
                resourceChart.data.datasets[0].data.shift();
                resourceChart.data.datasets[1].data.shift();
            }
            resourceChart.data.labels.push(now);
            resourceChart.data.datasets[0].data.push(metrics.cpu_percent || 0);
            resourceChart.data.datasets[1].data.push(metrics.memory_percent || 0);
            resourceChart.update();
        }

        function updateAlerts(alerts) {
            const container = document.getElementById('alertsList');
            
            if (alerts.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">No alerts yet</p>';
                return;
            }
            
            container.innerHTML = '';
            alerts.reverse().forEach(alert => {
                const alertEl = document.createElement('div');
                alertEl.className = `alert-item alert-${alert.severity.toLowerCase()}`;
                alertEl.innerHTML = `
                    <strong>${alert.severity}</strong>: ${alert.message}<br>
                    <small>${new Date(alert.timestamp).toLocaleString()}</small>
                `;
                container.appendChild(alertEl);
            });
        }

        async function startMonitoring() {
            try {
                await fetch('/api/start', { method: 'POST' });
                refreshData();
            } catch (error) {
                console.error('Error starting monitoring:', error);
            }
        }

        async function stopMonitoring() {
            try {
                await fetch('/api/stop', { method: 'POST' });
                refreshData();
            } catch (error) {
                console.error('Error stopping monitoring:', error);
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            refreshData();
            setInterval(refreshData, 5000); // Auto-refresh every 5 seconds
        });
    </script>
</body>
</html>
